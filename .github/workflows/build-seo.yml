name: Build SEO pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取得 repo
        uses: actions/checkout@v4

      - name: 安裝 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 產生景點頁
        run: node build.js

      - name: Commit 生成的檔案
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add spots sitemap.xml robots.txt
          git diff --staged --quiet || git commit -m "Update SEO pages [skip ci]"
          git push
