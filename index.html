// ── 從 Supabase 載入票券 ──
async function fetchTickets() {
  try {
    const { data, error } = await supabase
      .from('tickets')
      .select('*')
      .eq('status', '已上架')
      .order('sort_order', { ascending: true });
    if (error) throw error;
    return (data || []).map(row => ({
      id: row.id,
      cat: row.category || 'transport',
      icon: row.icon || '🎫',
      iconBg: row.icon_bg || 'rgba(192,57,43,0.1)',
      name: row.name || '',
      badge: row.badge || '',
      badgeText: row.badge_text || '',
      desc: row.description || '',
      note: row.note || '',
      price: row.price || '',
      priceNote: row.price_note || '',
      btnText: row.btn_text || '購票',
      btnType: row.btn_type || 'kkday',
      url: row.url || '',
    }));
  } catch(e) {
    console.error('票券載入失敗:', e);
    return [];
  }
}

async function fetchSpots() {
  try {
    const { data, error } = await supabase.from('spots').select('*').eq('status', '已上架').order('sort_order', { ascending: true });
    if (error) throw error;
    return (data || []).map((row, i) => {
      const parseFlexible = (field) => {
        if (!field) return [];
        if (Array.isArray(field)) return field;
        if (typeof field === 'string') {
          const t = field.trim();
          if (t.startsWith('[') || t.startsWith('{')) { try { const p=JSON.parse(t); return Array.isArray(p)?p:[p]; } catch(e){} }
          if (t.startsWith('{') && t.endsWith('}')) return t.slice(1,-1).split(',').map(s=>s.trim()).filter(Boolean);
          if (t.includes('｜')) return t.split('｜').map(s=>s.trim()).filter(Boolean);
          if (t.includes('|')) return t.split('|').map(s=>s.trim()).filter(Boolean);
          if (t.includes('\n')) return t.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
          return t?[t]:[];
        }
        return [];
      };
      const parseJSON = (field) => {
        if (!field) return [];
        if (Array.isArray(field)) return field;
        if (typeof field==='object'&&field!==null) return [field];
        if (typeof field==='string') {
          const t=field.trim();
          if (t.startsWith('[')||t.startsWith('{')) { try { return Array.isArray(JSON.parse(t))?JSON.parse(t):[JSON.parse(t)]; } catch(e){ return parseFlexible(field); } }
          return parseFlexible(field);
        }
        return [];
      };
      const metroLines = parseJSON(row.metro_lines);
      const metroInfo = metroLines.map(m=>(typeof m==='object'&&m.info)?m.info:(typeof m==='string'?m:'')).filter(Boolean).join('｜');
      const photos = parseJSON(row.photos);
      if (row.cover_photo && !photos.includes(row.cover_photo)) photos.unshift(row.cover_photo);
      const subFacilities = row.sub_facilities ? row.sub_facilities.split('•').map(item=>{
        const parts=item.split(',').map(x=>x.trim());
        return { name:parts[0]||'', price:parts[1]||'', url:parts[2]||'', note:parts.slice(3).join(',') };
      }).filter(x=>x.name) : [];
      return {
        id:row.id||("r"+i), name:row.name||'', jaName:row.name_ja||'', area:row.area||'',
        type:row.spot_type||'', axis:row.axis||'', tag:row.positioning||'',
        season:parseFlexible(row.season_highlights), metro:metroInfo, walkMin:row.walk_minutes||0,
        ticket:row.ticket_price||'', ticketMethod:row.ticket_method||'',
        ticketUrl:row.ticket_url_official||'', partnerUrl:row.ticket_url_partner||'',
        ticketNote:row.ticket_note||'', ticketAlert:parseFlexible(row.ticket_alerts),
        subTickets:subFacilities, openTime:row.opening_hours||'', holiday:row.closed_days||'',
        stayTime:row.suggested_duration||'', editorial:row.editorial||'',
        suitable:row.suitable_for||'', bestTime:row.best_visit_time||'',
        arrivalNote:row.arrival_note||'', tripType:row.trip_type||'',
        fromCity:row.from_city||'', transit:row.transit_method||'', tripTip:row.trip_tips||'',
        nearby:parseFlexible(row.nearby_spots), food:parseFlexible(row.food_recommendations),
        stay:parseFlexible(row.accommodation_recommendations), shops:parseFlexible(row.shop_recommendations),
        walking:[...parseFlexible(row.food_recommendations),...parseFlexible(row.accommodation_recommendations)],
        mapsUrl:row.google_maps_url||'', officialUrl:row.ticket_url_official||'',
        websiteUrl:row.website_url||'', sortOrder:row.sort_order||999, banner:row.banner||'',
        photos:photos.length?photos:["📸"]
      };
    });
  } catch(error) { console.error('Supabase 載入失敗:', error); return []; }
}

// ── 換乘顯示元件 ──
function ArrivalNote({note}){
  if(!note) return <div style={{fontSize:10,color:"#ccc",marginTop:2}}>🚇 換乘</div>;
  const options=note.trim().split('｜').map(o=>o.trim()).filter(Boolean);
  const multi=options.length>1;
  return(
    <>
      <div style={{fontSize:11,color:"#666",marginBottom:6,fontWeight:600}}>
        🚃 前往下一站{multi&&<span style={{color:"#999",fontWeight:400}}> （任選其一）</span>}
      </div>
      {options.map((opt,idx)=>{
        // 空格切路線名 和 站名
        const spaceIdx=opt.indexOf(' ');
        const line=spaceIdx>-1?opt.slice(0,spaceIdx):opt;
        const station=spaceIdx>-1?opt.slice(spaceIdx+1):'';
        return(
          <div key={idx} style={{marginBottom:idx<options.length-1?10:0,paddingLeft:8,borderLeft:multi?"2px solid #f0e6d3":"none"}}>
            <div style={{fontSize:11,color:"#e67e22",fontWeight:700,lineHeight:1.6}}>{line}</div>
            {station&&<div style={{fontSize:12,color:"#333",fontWeight:600,lineHeight:1.6,display:"flex",alignItems:"center",gap:4}}>
              <span style={{fontSize:10}}>🚇</span>{station}
            </div>}
          </div>
        );
      })}
    </>
  );
}

// ── 票券頁 ──
function TicketPage({tickets}){
  const [cat,setCat]=useState("all");
  const filtered=(tickets||[]).filter(t=>cat==="all"||t.cat===cat);
  const transportList=filtered.filter(t=>t.cat==="transport");
  const spotList=filtered.filter(t=>t.cat==="spot");
  const itineraryList=filtered.filter(t=>t.cat==="itinerary");
  const showTeaser=(cat==="all"||cat==="itinerary");

  const TicketCard=({t})=>(
    <div className="ticket-card">
      <div className="ticket-icon" style={{background:t.iconBg}}>{t.icon}</div>
      <div className="ticket-info">
        <div className="ticket-name">
          {t.name}
          {t.badge&&<span className={`ticket-badge badge-${t.badge}`}>{t.badgeText}</span>}
        </div>
        <div className="ticket-desc">{t.desc}</div>
        <div className="ticket-note">{t.note}</div>
        <div className="ticket-bottom">
          <div className="ticket-price">{t.price} <small>{t.priceNote}</small></div>
          {t.url
            ?<a href={t.url} target="_blank" rel="noreferrer" className={`ticket-btn btn-${t.btnType}`}>{t.btnText}</a>
            :<span style={{fontSize:12,color:"#999",background:"#f0f0f0",padding:"7px 12px",borderRadius:9,flexShrink:0}}>{t.btnText}</span>
          }
        </div>
      </div>
    </div>
  );

  return(
    <div style={{paddingBottom:24}}>
      {/* 篩選 */}
      <div className="ticket-filter-bar">
        {TICKET_CATS.map(c=>(
          <button key={c.id} className={`ticket-filter-btn${cat===c.id?" active":""}`} onClick={()=>setCat(c.id)}>{c.label}</button>
        ))}
      </div>

      {/* 行程包區塊 */}
      {showTeaser&&<>
        <div className="ticket-section-label">🎒 行程包</div>
        {itineraryList.length>0
          ?itineraryList.map(t=><TicketCard key={t.id} t={t}/>)
          :<div className="pack-teaser">
            <h3>🎒 旅日嚮導 行程包</h3>
            <p>幫你規劃好的完整攻略<br/>川越一日遊、東京神社散策…</p>
            <div className="pack-coming">即將推出 Coming Soon</div>
          </div>
        }
      </>}

      {/* 交通票券 */}
      {transportList.length>0&&<>
        <div className="ticket-section-label">🚆 交通票券</div>
        {transportList.map(t=><TicketCard key={t.id} t={t}/>)}
      </>}

      {/* 景點門票 */}
      {spotList.length>0&&<>
        <div className="ticket-section-label">🎟️ 景點門票</div>
        {spotList.map(t=><TicketCard key={t.id} t={t}/>)}
      </>}
    </div>
  );
}

  const mapsLink=()=>{

            const startX=e.currentTarget._swipeX;
            const startY=e.currentTarget._swipeY;

            const endX=e.changedTouches[0].clientX;

          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setSecret(true)} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",borderRadius:20,padding:"6px 12px",fontSize:11,cursor:"pointer"}}>💡 推薦景點</button>
            <button onClick={()=>setHelpPage(true)} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",borderRadius:20,padding:"6px 10px",fontSize:14,cursor:"pointer"}}>？</button>
          </div>
        </div>
        {activeTab==="explore"&&(
          <div style={{display:"flex",alignItems:"center",background:"rgba(255,255,255,0.15)",borderRadius:20,padding:"8px 14px",gap:8,border:"1px solid rgba(255,255,255,0.2)"}}>
            <span style={{fontSize:13,opacity:.7}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋景點、區域、類型…"
              style={{border:"none",outline:"none",fontSize:13,flex:1,background:"transparent",color:"#fff"}}/>
            {search&&<button onClick={()=>setSearch("")} style={{border:"none",background:"none",cursor:"pointer",fontSize:16,color:"rgba(255,255,255,0.6)",padding:0}}>×</button>}
          </div>
        )}
      </div>

      {/* Pages */}
      <div className="app-pages">

        {/* 探索 */}
        <div className={`app-page${activeTab==="explore"?" active":""}`}>
          {!q&&<div style={{padding:"8px 16px 4px",display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none"}}>
            {["", ...AXIS_ORDER].map(ax=>(
              <button key={ax||"all"} onClick={()=>setAxisFilter(ax)}
                style={{padding:"5px 12px",borderRadius:20,border:"none",
                  background:axisFilter===ax?(ax?AXES[ax].color:"#c0392b"):"#f0f0f0",
                  color:axisFilter===ax?"#fff":"#666",fontSize:11,cursor:"pointer",
                  whiteSpace:"nowrap",flexShrink:0,fontWeight:axisFilter===ax?700:400}}>
                {ax||"全部"}
              </button>
            ))}
          </div>}

          {q?(
            <div style={{padding:"8px 16px 4px"}}>
              <div style={{fontSize:12,color:"#aaa",marginBottom:8}}>搜尋結果（{searchResults.length}筆）</div>
              {searchResults.length===0
                ?<div style={{textAlign:"center",padding:"40px 0",color:"#ccc"}}>找不到相關景點</div>
                :<div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {searchResults.map(s=>{
                    const isSel=sel.includes(s.id),sa=getAx(s.axis);
                    return(
                      <div key={s.id} style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"2px solid "+(isSel?sa.color:"#eee"),boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
                        {s.photos&&s.photos[0]&&s.photos[0].startsWith("http")&&
                          <img src={s.photos[0]} style={{width:"100%",height:100,objectFit:"cover",display:"block"}} alt=""/>}
                        <div style={{padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:700,fontSize:15}}>{s.name}</div>
                            <div style={{fontSize:11,color:"#999",marginTop:2}}>{s.area}<span style={{color:sa.color,marginLeft:6}}>{s.axis}</span></div>
                          </div>
                          <div style={{display:"flex",gap:6}}>
                            <button onClick={()=>{setDid(s.id);setPage("detail");}} style={{fontSize:11,background:"#f5f5f5",border:"none",borderRadius:12,padding:"4px 10px",cursor:"pointer",color:"#666"}}>詳情</button>
                            <button onClick={()=>toggleSel(s.id)} style={{fontSize:12,background:isSel?sa.color:"#f0f0f0",color:isSel?"#fff":"#555",border:"none",borderRadius:12,padding:"4px 14px",cursor:"pointer",fontWeight:700}}>{isSel?"✓":"＋"}</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>}
            </div>
          ):(
            <div style={{paddingTop:4,paddingBottom:8}}>
              {(()=>{
                const bannerSpots=spots.filter(s=>s.banner).sort((a,b)=>a.sortOrder-b.sortOrder);
                if(!bannerSpots.length) return null;
                const bannerText=bannerSpots[0].banner;
                const bannerColor=AXIS[bannerSpots[0].axis]?.color||"#c0392b";
                return(
                  <div style={{margin:"8px 16px",borderRadius:12,overflow:"hidden",border:"1.5px solid "+bannerColor+"44"}}>
                    <div style={{background:"linear-gradient(135deg,"+bannerColor+"22,"+bannerColor+"11)",padding:"10px 14px 8px"}}>
                      <div style={{fontSize:12,fontWeight:700,color:bannerColor,marginBottom:6}}>✨ {bannerText}</div>
                      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
                        {bannerSpots.map(s=>(
                          <div key={s.id} onClick={()=>{setDid(s.id);setPage("detail");}}
                            style={{flexShrink:0,display:"flex",alignItems:"center",gap:8,background:"#fff",borderRadius:10,padding:"6px 10px",cursor:"pointer",border:"1px solid "+bannerColor+"33"}}>
                            {s.photos[0]&&s.photos[0].startsWith("http")
                              ?<img src={s.photos[0]} style={{width:36,height:36,borderRadius:8,objectFit:"cover"}} alt=""/>
                              :<div style={{width:36,height:36,borderRadius:8,background:AXIS[s.axis]?.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{AXIS[s.axis]?.icon}</div>}
                            <div>
                              <div style={{fontSize:12,fontWeight:700,color:"#333"}}>{s.name}</div>
                              <div style={{fontSize:10,color:"#999"}}>{s.area}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                );
              })()}
              {AXIS_ORDER.map(axName=>{
                if(axisFilter&&axisFilter!==axName) return null;
                const axSpots=spots.filter(s=>s.axis===axName).sort((a,b)=>a.sortOrder-b.sortOrder);
                if(!axSpots.length) return null;
                return(
                  <div key={axName} style={{marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 16px 4px"}}>
                      <div style={{fontWeight:700,fontSize:14,color:"#333"}}>{axName}</div>
                      <div style={{fontSize:11,color:"#bbb"}}>{axSpots.length}個景點</div>
                    </div>
                    <div className="hscroll">
                      {axSpots.map(s=>(
                        <SpotCard key={s.id} s={s} isSel={sel.includes(s.id)}
                          onClick={()=>{setDid(s.id);setPage("detail");}}
                          onToggle={()=>toggleSel(s.id)}
                          isFav={favs.includes(s.id)} onFav={()=>toggleFav(s.id)}/>
                      ))}
                    </div>
                  </div>
                );
              })}
              {spots.filter(s=>!AXIS[s.axis]).length>0&&(
                <div style={{marginBottom:8}}>
                  <div style={{padding:"8px 16px 4px",fontWeight:700,fontSize:14,color:"#333"}}>📍 其他景點</div>
                  <div className="hscroll">
                    {spots.filter(s=>!AXIS[s.axis]).map(s=>(
                      <SpotCard key={s.id} s={s} isSel={sel.includes(s.id)}
                        onClick={()=>{setDid(s.id);setPage("detail");}}
                        onToggle={()=>toggleSel(s.id)}
                        isFav={favs.includes(s.id)} onFav={()=>toggleFav(s.id)}/>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* 票券 */}
        <div className={`app-page${activeTab==="ticket"?" active":""}`}>
          <TicketPage tickets={tickets}/>
        </div>

        {/* 收藏 */}
        <div className={`app-page${activeTab==="fav"?" active":""}`}>
          <div style={{padding:"16px 16px 8px"}}>
            <div style={{fontSize:20,fontWeight:800,marginBottom:2}}>❤️ 我的收藏</div>
            <div style={{fontSize:12,color:"#999"}}>點景點卡片左上角的 ❤️ 加入收藏</div>
          </div>
          <div style={{padding:"0 16px 24px"}}>
            {favs.length===0
              ?<div style={{textAlign:"center",padding:"60px 0",color:"#ccc"}}>
                  <div style={{fontSize:48,marginBottom:12}}>🤍</div>
                  <div style={{fontSize:14}}>還沒有收藏的景點</div>
                  <div style={{fontSize:12,marginTop:8,color:"#bbb"}}>點景點卡片上的愛心來收藏</div>
                </div>
              :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                {favs.map(id=>{
                  const s=spots.find(x=>x.id===id);
                  if(!s) return null;
                  const sa=getAx(s.axis);
                  return(
                    <div key={id} style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #eee",display:"flex",alignItems:"center"}}>
                      {s.photos&&s.photos[0]&&s.photos[0].startsWith("http")
                        ?<img src={s.photos[0]} style={{width:70,height:70,objectFit:"cover",flexShrink:0}} alt=""/>
                        :<div style={{width:70,height:70,background:sa.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>{sa.icon}</div>}
                      <div style={{flex:1,padding:"10px 12px",minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:14}}>{s.name}</div>
                        <div style={{fontSize:11,color:"#999",marginTop:2}}>{s.area}・{s.axis}</div>
                        {s.ticket&&<div style={{fontSize:11,color:"#c0392b",marginTop:3}}>🎟 {s.ticket}</div>}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:6,padding:"0 10px",flexShrink:0}}>
                        <button onClick={()=>{setDid(s.id);setPage("detail");}} style={{background:"#f5f5f5",border:"none",borderRadius:10,padding:"5px 10px",cursor:"pointer",fontSize:11,color:"#555"}}>查看</button>
                        <button onClick={()=>toggleSel(s.id)} style={{background:sel.includes(s.id)?"#c0392b":"#f5f5f5",border:"none",borderRadius:10,padding:"5px 10px",cursor:"pointer",fontSize:11,color:sel.includes(s.id)?"#fff":"#555"}}>{sel.includes(s.id)?"已加入":"加行程"}</button>
                        <button onClick={()=>toggleFav(id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,padding:"2px"}}>❤️</button>
                      </div>
                    </div>
                  );
                })}
              </div>}
          </div>
        </div>

        {/* 行程 */}
        <div className={`app-page${activeTab==="itin"?" active":""}`}>
          <div style={{padding:"16px 16px 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:20,fontWeight:800,marginBottom:2}}>📋 我的行程</div>
              <div style={{fontSize:12,color:"#999"}}>最多選 4 個景點</div>
            </div>
            {selSpots.length>0&&<div style={{fontSize:12,color:"#c0392b",background:"#fff0f0",borderRadius:20,padding:"4px 12px",fontWeight:700}}>{selSpots.length} / 4 站</div>}
          </div>

          {selSpots.length===0
            ?<div style={{margin:"0 16px",background:"#fff",borderRadius:14,padding:"32px 20px",textAlign:"center",color:"#bbb"}}>
                <div style={{fontSize:44,marginBottom:12}}>🗺️</div>
                <div style={{fontSize:14,marginBottom:6}}>還沒有選擇景點</div>
                <div style={{fontSize:12,lineHeight:1.7}}>到「探索」頁面點景點卡片右上角的 <strong style={{color:"#555"}}>＋</strong> 加入行程</div>
              </div>
            :<div style={{padding:"0 16px"}}>
              <div style={{fontSize:11,color:"#888",marginBottom:12,background:"#f8f8f8",padding:"7px 10px",borderRadius:6,lineHeight:1.5}}>
                ℹ️ 點「查電車」查看詳細轉乘路線
              </div>
              {selSpots.map((s,i)=>{
                const sa=getAx(s.axis);
                return(
                  <div key={s.id}>
                    {/* 景點列 */}
                    <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:4,background:"#fff",borderRadius:12,padding:"10px 12px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                      <div style={{width:24,height:24,background:sa.color,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:14}}>{s.name}</div>
                        <div style={{fontSize:11,color:"#999",marginTop:1}}>{s.area}</div>
                      </div>
                      <button onClick={()=>toggleSel(s.id)} style={{fontSize:16,background:"none",border:"none",cursor:"pointer",color:"#ccc",flexShrink:0,padding:0}}>×</button>
                    </div>
                    {/* 換乘資訊 */}
                    {i<selSpots.length-1&&(
                      <div style={{marginLeft:22,paddingLeft:12,borderLeft:"1px dashed #e0e0e0",paddingBottom:6,marginBottom:4,paddingTop:4}}>
                        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
                          <div style={{flex:1}}>
                            <ArrivalNote note={selSpots[i+1].arrivalNote}/>
                          </div>
                          <a href={"https://www.google.com/maps/dir/"+encodeURIComponent(selSpots[i].name)+"/"+encodeURIComponent(selSpots[i+1].name)+"/?travelmode=transit&hl=ja"}
                            target="_blank" rel="noreferrer"
                            style={{fontSize:10,background:"#e8f4fd",color:"#1a73e8",border:"1px solid #c5dff8",borderRadius:10,padding:"4px 8px",textDecoration:"none",fontWeight:700,whiteSpace:"nowrap",flexShrink:0,marginTop:2}}>
                            查電車 →
                          </a>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
              <div style={{display:"flex",gap:8,marginTop:14,paddingBottom:24}}>
                <a href={mapsLink()} target="_blank" rel="noreferrer"
                  style={{flex:1,background:"#c0392b",color:"#fff",border:"none",borderRadius:20,padding:"11px",fontWeight:700,fontSize:13,textDecoration:"none",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  🗺 Google Maps 導航
                </a>
                <button onClick={()=>setShared(true)} style={{background:"#2c3e50",color:"#fff",border:"none",borderRadius:20,padding:"11px 14px",cursor:"pointer",fontSize:13}}>📤</button>
                <button onClick={()=>setSel([])} style={{background:"#f0f0f0",color:"#888",border:"none",borderRadius:20,padding:"11px 14px",cursor:"pointer",fontSize:12}}>清除</button>
              </div>
            </div>}
        </div>

      </div>{/* end app-pages */}

      {/* 底部導航 */}
      <nav className="bottom-nav">
        {[
          {id:"explore",icon:"🗾",label:"探索"},
          {id:"ticket",icon:"🎫",label:"票券"},
          {id:"fav",icon:"❤️",label:"收藏",badge:favs.length||0},
          {id:"itin",icon:"📋",label:"行程",badge:sel.length||0},
        ].map(t=>(
          <button key={t.id} className={`nav-tab${activeTab===t.id?" active":""}`}
            onClick={()=>{setActiveTab(t.id);if(t.id!=="explore")setSearch("");}}>
            {t.badge>0&&<div className="nav-badge">{t.badge}</div>}
            <span className="nav-icon">{t.icon}</span>
            <span className="nav-label">{t.label}</span>
          </button>
        ))}
      </nav>

      {/* Modals */}
      {showInstall&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200,padding:"0 0 20px"}}>
          <div style={{background:"#fff",borderRadius:20,padding:"24px 20px",width:"100%",maxWidth:420,margin:"0 16px"}}>
            <div style={{fontSize:28,textAlign:"center",marginBottom:8}}>📲</div>
            <div style={{fontWeight:700,fontSize:17,textAlign:"center",marginBottom:6}}>加到手機主畫面</div>
            <div style={{fontSize:13,color:"#666",textAlign:"center",marginBottom:16,lineHeight:1.7}}>下次不用找網址，直接從桌面開啟！</div>
            <div style={{background:"#f8f8f8",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
              <div style={{fontSize:13,marginBottom:8,fontWeight:600,color:"#333"}}>🍎 iPhone / iPad</div>
              <div style={{fontSize:12,color:"#555",lineHeight:1.8}}>點底部中間的 <span style={{background:"#e0e0e0",borderRadius:4,padding:"1px 6px",fontWeight:600}}>⬆ 分享</span> → 選「加入主畫面」→ 點右上角「新增」</div>
              <div style={{fontSize:11,color:"#e67e22",marginTop:6}}>⚠️ 請用 Safari 開啟，Chrome 不支援</div>
            </div>
            <div style={{background:"#f8f8f8",borderRadius:12,padding:"12px 14px",marginBottom:20}}>
              <div style={{fontSize:13,marginBottom:8,fontWeight:600,color:"#333"}}>🤖 Android</div>
              <div style={{fontSize:12,color:"#555",lineHeight:1.8}}>點右上角 <span style={{background:"#e0e0e0",borderRadius:4,padding:"1px 6px",fontWeight:600}}>⋮ 選單</span> → 選「新增至主畫面」</div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>dismissInstall(false)} style={{flex:1,background:"#f0f0f0",border:"none",borderRadius:20,padding:"11px",cursor:"pointer",fontSize:13,color:"#888"}}>下次再說</button>
              <button onClick={()=>dismissInstall(true)} style={{flex:2,background:"#c0392b",border:"none",borderRadius:20,padding:"11px",cursor:"pointer",fontSize:13,color:"#fff",fontWeight:700}}>知道了 ✓</button>
            </div>
          </div>
        </div>
      )}

      {shared&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:99,padding:20}}>
        <div style={{background:"#fff",borderRadius:16,padding:20,width:"100%",maxWidth:340}}>
          <div style={{fontWeight:700,marginBottom:10}}>📤 分享行程</div>
          <textarea readOnly value={shareText()} style={{width:"100%",height:160,borderRadius:8,border:"1px solid #eee",padding:8,fontSize:12,boxSizing:"border-box",resize:"none",lineHeight:1.6}}/>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button onClick={()=>setShared(false)} style={{flex:1,background:"#eee",border:"none",borderRadius:20,padding:"8px",cursor:"pointer"}}>關閉</button>
            <button onClick={()=>navigator.clipboard&&navigator.clipboard.writeText(shareText())} style={{flex:1,background:"#27ae60",color:"#fff",border:"none",borderRadius:20,padding:"8px",cursor:"pointer",fontSize:13}}>複製文字</button>
          </div>
        </div>
      </div>}

      {secret&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:99,padding:20}}>
        <div style={{background:"#fff",borderRadius:16,padding:20,width:"100%",maxWidth:340,maxHeight:"90vh",overflowY:"auto"}}>
          {sSent?<div style={{textAlign:"center",padding:"24px 0"}}>
            <div style={{fontSize:48}}>🎉</div>
            <div style={{fontWeight:700,fontSize:17,marginTop:8}}>感謝你的推薦！</div>
            <div style={{fontSize:13,color:"#666",marginTop:8,lineHeight:1.7}}>審核通過後我們會透過官方信箱聯絡你！</div>
            <div style={{marginTop:12,background:"#fef5e7",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#e67e22"}}>⏱ 審核時間約 2–4 週</div>
            <button onClick={()=>{setSecret(false);setSSent(false);setSf({name:"",area:"",desc:"",email:""});}} style={{marginTop:16,background:"#c0392b",color:"#fff",border:"none",borderRadius:20,padding:"10px 28px",cursor:"pointer",fontWeight:700}}>關閉</button>
          </div>:<>
            <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>💡 推薦私房景點</div>
            <div style={{fontSize:12,color:"#888",marginBottom:12,lineHeight:1.6}}>推薦通過審核上架後，我們會寄送通知！</div>
            <label style={{fontSize:12,color:"#555"}}>景點名稱 *</label>
            <input value={sf.name} onChange={e=>setSf(f=>({...f,name:e.target.value}))} placeholder="景點名稱" style={S}/>
            <label style={{fontSize:12,color:"#555",marginTop:10,display:"block"}}>所在區域 *</label>
            <input value={sf.area} onChange={e=>setSf(f=>({...f,area:e.target.value}))} placeholder="例：台東區" style={S}/>
            <label style={{fontSize:12,color:"#555",marginTop:10,display:"block"}}>景點描述 *</label>
            <textarea value={sf.desc} onChange={e=>setSf(f=>({...f,desc:e.target.value}))} placeholder="為什麼推薦？" style={{...S,height:70,resize:"none"}}/>
            <label style={{fontSize:12,color:"#555",marginTop:10,display:"block"}}>Email *</label>
            <input type="email" value={sf.email} onChange={e=>setSf(f=>({...f,email:e.target.value}))} placeholder="your@email.com" style={S}/>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={()=>setSecret(false)} style={{flex:1,background:"#eee",border:"none",borderRadius:20,padding:"10px",cursor:"pointer"}}>取消</button>
              <button onClick={()=>{if(sf.name&&sf.area&&sf.desc&&sf.email)setSSent(true);}}
                style={{flex:2,background:(sf.name&&sf.area&&sf.desc&&sf.email)?"#c0392b":"#ddd",color:(sf.name&&sf.area&&sf.desc&&sf.email)?"#fff":"#aaa",border:"none",borderRadius:20,padding:"10px",cursor:"pointer",fontWeight:700}}>
                送出推薦 ✈️
              </button>
            </div>
          </>}
        </div>
      </div>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/tabinihon/sw.js')
      .then(() => console.log('✅ SW 註冊成功'))
      .catch(e => console.log('SW 註冊失敗', e));
  });
}
</script>
</body>
</html>
