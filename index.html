        }

            alert('付費訂閱功能預計 2026 年 10 月上線！\n\n現在可以先使用免費版，到時會有早鳥優惠通知。');
        }
        
        // 渲染收藏
        function renderFavorites() {
            const container = document.getElementById('favorites-content');
            
            if (favorites.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❤️</div>
                        <h3>還沒有收藏任何景點</h3>
                        <p>點擊景點卡片上的愛心圖示來收藏</p>
                    </div>
                `;
                return;
            }
            
            const favoriteSpots = allSpots.filter(spot => favorites.includes(spot.name));
            container.innerHTML = `
                <div class="spots-scroll">
                    ${favoriteSpots.map(spot => createSpotCard(spot)).join('')}
                </div>
            `;
        }
        
        // 渲染我的行程
        function renderMyTrip() {
            const container = document.getElementById('trip-content');
            
            if (selectedSpots.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📍</div>
                        <h3>還沒有規劃行程</h3>
                        <p>點擊景點卡片上的 ＋ 圖示來加入行程（最多 4 個）</p>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="trip-spots-list">';
            selectedSpots.forEach((spotName, index) => {
                const spot = allSpots.find(s => s.name === spotName);
                if (!spot) return;
                
                html += `
                    <div class="trip-spot-item">
                        <div class="trip-number">${index + 1}</div>
                        <div class="trip-spot-info">
                            <h4>${spot.name}</h4>
                            <p>🚇 ${spot.station} ${spot.walkTime}分 · 💴 ${spot.fee}</p>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            
            html += `
                <div class="trip-actions">
                    <button class="btn-primary" onclick="alert('分享行程功能開發中')">
                        📤 分享行程
                    </button>
                    <button class="btn-secondary" onclick="clearTrip()">
                        🗑️ 清空行程
                    </button>
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        function clearTrip() {
            if (confirm('確定要清空行程嗎？')) {
                selectedSpots = [];
                localStorage.setItem('selectedSpots', JSON.stringify(selectedSpots));
                renderMyTrip();
                renderSpots(allSpots);
            }
        }
        
        // 切換 Tab
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.style.display = 'none';
            });
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            document.getElementById(`${tabName}-tab`).style.display = 'block';
            event.currentTarget.classList.add('active');
            
            if (tabName === 'favorites') {
                renderFavorites();
            } else if (tabName === 'trip') {
                renderMyTrip();
            }
        }
        
        // 搜尋功能
        document.getElementById('search-input').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            if (keyword === '') {
                renderSpots(allSpots);
            } else {
                const filtered = allSpots.filter(spot => 
                    spot.name.toLowerCase().includes(keyword) ||
                    spot.description.toLowerCase().includes(keyword)
                );
                renderSpots(filtered);
            }
        });
        
        // 軸線篩選
        document.querySelectorAll('.axis-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.axis-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                const axis = e.target.dataset.axis;
                if (axis === 'all') {
                    renderSpots(allSpots);
                } else {
                    const filtered = allSpots.filter(spot => spot.axis === axis);
                    renderSpots(filtered);
                }
            });
        });
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadSpots();
            renderExampleTrips();
            renderUpgradeComparison();
        });
        
        // 註冊 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
