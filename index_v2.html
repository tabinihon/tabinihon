async function loadSpots() {
  try {
    // 從 Supabase 讀取景點
    const { data, error } = await supabase
      .from('spots')
      .select('*')
      .eq('status', '已上架')
      .order('sort_order');

    if (error) throw error;

    if (!data || data.length === 0) {
      console.warn('無景點資料,使用示範資料');
      return DEMO;
    }

    // 轉換 Supabase 資料格式為 APP 格式
    const converted = data.map(spot => ({
      id: spot.id.toString(),
      name: spot.name,
      jaName: spot.name_ja || '',
      area: spot.area || '',
      type: spot.spot_type || '',
      axis: spot.axis || '',
      tag: spot.positioning || '',
      season: spot.season_highlights ? spot.season_highlights.split('｜') : [],

      // 地鐵資訊
      metro: Array.isArray(spot.metro_lines) && spot.metro_lines.length > 0
        ? spot.metro_lines.map(m => m.info || m).join(' / ')
        : '',
      walkMin: spot.walk_minutes || 0,

      // 票價
      ticket: spot.ticket_price?.adult === 0 
        ? '免費入場'
        : spot.ticket_price?.adult 
        ? `大人 ¥${spot.ticket_price.adult}`
        : spot.ticket_method || '',
      ticketUrl: spot.ticket_url_official || '',
      partnerUrl: spot.ticket_url_partner || '',
      ticketMethod: spot.ticket_method || '',
      ticketNote: spot.ticket_note || '',
      ticketAlert: spot.ticket_alerts ? spot.ticket_alerts.split('｜') : [],

      // 子設施
      subTickets: spot.sub_facilities ? parseSubFacilities(spot.sub_facilities) : [],

      // 時間資訊
      openTime: spot.opening_hours || '',
      holiday: spot.closed_days || '',
      stayTime: spot.suggested_duration || '',

      // 內容
      editorial: spot.editorial || '',
      suitable: spot.suitable_for || '',
      bestTime: spot.best_visit_time || '',

      // 推薦
      nearby: spot.nearby_spots || [],
      food: spot.food_recommendations || [],
      stay: spot.accommodation_recommendations || [],
      shops: spot.shop_recommendations || [],
      walking: [
        ...(spot.nearby_spots || []),
        ...(spot.food_recommendations || []),
        ...(spot.accommodation_recommendations || []),
        ...(spot.shop_recommendations || [])
      ],

      // 交通
      arrivalNote: spot.arrival_note || '',
      tripType: spot.axis === '近郊小旅行' ? '小旅行' : '',
      fromCity: spot.departure_suggestion || '',
      transit: spot.transport_method || '',
      tripTip: spot.trip_suggestion || '',

      // 其他
      mapsUrl: spot.google_maps_url || '',
      photos: Array.isArray(spot.photos) && spot.photos.length > 0
        ? spot.photos
        : spot.cover_photo ? [spot.cover_photo] : [],
      visitDate: spot.visited_date || ''
    }));

    return converted;
  } catch (err) {
    console.error('讀取景點失敗:', err);
    alert('無法載入景點資料');
    return DEMO;
  }
}

// 解析子設施
function parseSubFacilities(text) {
  if (!text) return [];
  return text.split('•').filter(f => f.trim()).map(facility => {
    const parts = facility.split(',');
    return {
      name: parts[0]?.trim() || '',
      price: parts[1]?.trim() || '',
      url: parts[2]?.trim() || '',
      note: parts[3]?.trim() || ''
    };
  });
}

    try {
      const raw=localStorage.getItem("tabinihon_favs");

      const {ids,ts}=JSON.parse(raw);
      // 超過180天才清除（旅遊規劃通常3-6個月）
      if(Date.now()-ts > 180*24*60*60*1000) return [];
      return ids||[];
    } catch(e){ return []; }
  });

  const toggleFav=id=>{
    setFavs(prev=>{
      const next=prev.includes(id)?prev.filter(x=>x!==id):[...prev,id];

    catch(e){ return false; }
  });

    if(remember){
      try{ localStorage.setItem("tabinihon_install_shown","1"); }catch(e){}

              })()}

            {!!(spot.subTickets||[]).length&&<div style={{background:"#fafafa",border:"1px solid #f0f0f0",borderRadius:10,padding:"10px 12px"}}>

              {(spot.subTickets||[]).map((item,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:i<spot.subTickets.length-1?8:0}}>

              下次不用找網址，直接從桌面開啟！
            </div>
            <div style={{background:"#f8f8f8",borderRadius:12,padding:"12px 14px",marginBottom:16}}>
              <div style={{fontSize:13,marginBottom:10,fontWeight:600,color:"#333"}}>🍎 iPhone / iPad</div>
              <div style={{fontSize:12,color:"#555",lineHeight:1.8}}>
                點底部中間的 <span style={{background:"#e0e0e0",borderRadius:4,padding:"1px 6px",fontWeight:600}}>⬆ 分享</span> 按鈕<br/>
                → 選「<span style={{fontWeight:600}}>加入主畫面</span>」<br/>
                → 點右上角「新增」
              </div>
              <div style={{fontSize:11,color:"#e67e22",marginTop:6}}>⚠️ 請用 Safari 開啟，Chrome 不支援</div>
            </div>
            <div style={{background:"#f8f8f8",borderRadius:12,padding:"12px 14px",marginBottom:20}}>
              <div style={{fontSize:13,marginBottom:10,fontWeight:600,color:"#333"}}>🤖 Android</div>
              <div style={{fontSize:12,color:"#555",lineHeight:1.8}}>
                點右上角 <span style={{background:"#e0e0e0",borderRadius:4,padding:"1px 6px",fontWeight:600}}>⋮ 選單</span><br/>
                → 選「<span style={{fontWeight:600}}>新增至主畫面</span>」
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>dismissInstall(false)} style={{flex:1,background:"#f0f0f0",border:"none",borderRadius:20,padding:"11px",cursor:"pointer",fontSize:13,color:"#888"}}>
                下次再說
              </button>
              <button onClick={()=>dismissInstall(true)} style={{flex:2,background:"#c0392b",border:"none",borderRadius:20,padding:"11px",cursor:"pointer",fontSize:13,color:"#fff",fontWeight:700}}>
                知道了 ✓
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 使用說明頁面 */}
      {helpPage&&(
        <div style={{position:"fixed",inset:0,background:"#f8f8f8",zIndex:100,maxWidth:420,margin:"0 auto",overflowY:"auto"}}>
          <div style={{background:"linear-gradient(135deg,#922b21,#c0392b)",color:"#fff",padding:"16px 16px 14px",display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setHelpPage(false)} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:20,padding:"4px 12px",cursor:"pointer",fontSize:12}}>← 返回</button>
            <div style={{fontWeight:700,fontSize:16}}>？ 使用說明</div>
          </div>
          <div style={{padding:"16px"}}>

            {/* Q1 加入主畫面 */}
            <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:10,color:"#c0392b"}}>📲 如何加到手機主畫面？</div>
              <div style={{background:"#f8f8f8",borderRadius:10,padding:"12px",marginBottom:8}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>🍎 iPhone（請用 Safari）</div>
                <div style={{fontSize:12,color:"#555",lineHeight:1.9}}>
                  1. 點底部中間的 <span style={{background:"#e0e0e0",borderRadius:4,padding:"1px 6px"}}>⬆ 分享</span> 按鈕<br/>
                  2. 選「加入主畫面」<br/>
                  3. 點右上角「新增」完成
                </div>
                <div style={{fontSize:11,color:"#e67e22",marginTop:6}}>⚠️ 必須用 Safari，Chrome 不支援</div>
              </div>
              <div style={{background:"#f8f8f8",borderRadius:10,padding:"12px"}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>🤖 Android</div>
                <div style={{fontSize:12,color:"#555",lineHeight:1.9}}>
                  1. 點右上角 <span style={{background:"#e0e0e0",borderRadius:4,padding:"1px 6px"}}>⋮ 選單</span><br/>
                  2. 選「新增至主畫面」
                </div>
              </div>
            </div>

            {/* Q2 收藏 vs 行程 */}
            <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:10,color:"#c0392b"}}>❤️ 收藏和加入行程有什麼不同？</div>
              <div style={{display:"flex",gap:10}}>
                <div style={{flex:1,background:"#fff0f0",borderRadius:10,padding:"10px 12px"}}>
                  <div style={{fontWeight:600,fontSize:12,marginBottom:4}}>❤️ 收藏</div>
                  <div style={{fontSize:11,color:"#666",lineHeight:1.7}}>存起來之後慢慢看，不限數量，關掉 APP 也不會消失</div>
                </div>
                <div style={{flex:1,background:"#f0f8ff",borderRadius:10,padding:"10px 12px"}}>
                  <div style={{fontWeight:600,fontSize:12,marginBottom:4}}>＋ 加入行程</div>
                  <div style={{fontSize:11,color:"#666",lineHeight:1.7}}>今天要走的路線，最多4個，可以直接導航和查電車</div>
                </div>
              </div>
            </div>

            {/* Q3 查電車 */}
            <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:8,color:"#c0392b"}}>🚃 查電車路線怎麼用？</div>
              <div style={{fontSize:12,color:"#555",lineHeight:1.9}}>
                1. 點景點卡片右上角 <span style={{background:"#e0e0e0",borderRadius:4,padding:"1px 6px"}}>＋</span> 選兩個以上景點<br/>
                2. 底部面板換乘資訊旁邊有 <span style={{background:"#e8f4fd",color:"#1a73e8",borderRadius:4,padding:"1px 6px",fontSize:11}}>查電車 →</span><br/>
                3. 點擊後直接開啟 Google Maps 電車路線
              </div>
            </div>

            {/* Q4 走訪認證 */}
            <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:8,color:"#c0392b"}}>✅ 走訪認證是什麼？</div>
              <div style={{fontSize:12,color:"#555",lineHeight:1.9}}>
                景點內的周邊散步、特色店家推薦分兩種：<br/>
                <span style={{color:"#27ae60",fontWeight:600}}>✅ 綠色</span> = 編輯實地走訪確認<br/>
                一般顏色 = 依公開評價篩選的編輯精選<br/><br/>
                點推薦區塊標題旁的 ℹ️ 可以查看說明
              </div>
            </div>

            {/* Q5 資料更新 */}
            <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:8,color:"#c0392b"}}>📋 資料準確嗎？發現錯誤怎麼辦？</div>
              <div style={{fontSize:12,color:"#555",lineHeight:1.9}}>
                所有景點資料由編輯團隊查核，但票價、開放時間等資訊可能隨時變動，建議出發前至官方網站確認。<br/><br/>
                發現資訊有誤，點景點內「<span style={{background:"#f0f0f0",borderRadius:4,padding:"1px 6px"}}>回報問題</span>」按鈕，我們會盡快複查更新。
              </div>
            </div>

            {/* Q6 推薦私房景點 */}
            <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",marginBottom:24,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:8,color:"#c0392b"}}>💡 怎麼推薦私房景點？</div>
              <div style={{fontSize:12,color:"#555",lineHeight:1.9}}>
                點右上角「💡 推薦私房景點」填寫景點資訊。<br/><br/>
                審核通過上架後會寄送通知，歡迎推薦你認為值得被更多人知道的好地方！
              </div>
            </div>

          </div>
        </div>
      )}

      {/* 收藏頁面 */}
      {favPage&&(
        <div style={{position:"fixed",inset:0,background:"#f8f8f8",zIndex:100,maxWidth:420,margin:"0 auto",overflowY:"auto"}}>
          <div style={{background:"linear-gradient(135deg,#922b21,#c0392b)",color:"#fff",padding:"16px 16px 14px",display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setFavPage(false)} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:20,padding:"4px 12px",cursor:"pointer",fontSize:12}}>← 返回</button>
            <div style={{fontWeight:700,fontSize:16}}>❤️ 我的收藏</div>
          </div>
          <div style={{padding:"12px 16px"}}>
            {favs.length===0
              ?<div style={{textAlign:"center",padding:"60px 0",color:"#ccc"}}>
                  <div style={{fontSize:48,marginBottom:12}}>🤍</div>
                  <div style={{fontSize:14}}>還沒有收藏的景點</div>
                  <div style={{fontSize:12,marginTop:8,color:"#bbb"}}>點景點卡片上的愛心來收藏</div>
                </div>
              :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                {favs.map(id=>{
                  const s=spots.find(x=>x.id===id);
                  if(!s) return null;
                  const sa=getAx(s.axis);
                  return(
                    <div key={id} style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #eee",display:"flex",alignItems:"center",gap:0}}>
                      {s.photos&&s.photos[0]&&s.photos[0].startsWith("http")
                        ?<img src={s.photos[0]} style={{width:70,height:70,objectFit:"cover",flexShrink:0}} alt=""/>
                        :<div style={{width:70,height:70,background:sa.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>{sa.icon}</div>
                      }
                      <div style={{flex:1,padding:"10px 12px",minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:14}}>{s.name}</div>
                        <div style={{fontSize:11,color:"#999",marginTop:2}}>{s.area}・{s.axis}</div>
                        {s.ticket&&<div style={{fontSize:11,color:"#c0392b",marginTop:3}}>🎟 {s.ticket}</div>}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:6,padding:"0 10px",flexShrink:0}}>
                        <button onClick={()=>{setDid(s.id);setPage("detail");setFavPage(false);}} style={{background:"#f5f5f5",border:"none",borderRadius:10,padding:"5px 10px",cursor:"pointer",fontSize:11,color:"#555"}}>查看</button>
                        <button onClick={()=>toggleSel(s.id)} style={{background:sel.includes(s.id)?"#c0392b":"#f5f5f5",border:"none",borderRadius:10,padding:"5px 10px",cursor:"pointer",fontSize:11,color:sel.includes(s.id)?"#fff":"#555"}}>{sel.includes(s.id)?"已加入":"加行程"}</button>
                        <button onClick={()=>toggleFav(id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,padding:"2px"}}>❤️</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            }
          </div>
        </div>
      )}

      {/* 分享 Modal */}
      {shared&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:99,padding:20}}>
        <div style={{background:"#fff",borderRadius:16,padding:20,width:"100%",maxWidth:340}}>
          <div style={{fontWeight:700,marginBottom:10}}>📤 分享行程</div>
          <textarea readOnly value={shareText()} style={{width:"100%",height:160,borderRadius:8,border:"1px solid #eee",padding:8,fontSize:12,boxSizing:"border-box",resize:"none",lineHeight:1.6}}/>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button onClick={()=>setShared(false)} style={{flex:1,background:"#eee",border:"none",borderRadius:20,padding:"8px",cursor:"pointer"}}>關閉</button>
            <button onClick={()=>navigator.clipboard&&navigator.clipboard.writeText(shareText())} style={{flex:1,background:"#27ae60",color:"#fff",border:"none",borderRadius:20,padding:"8px",cursor:"pointer",fontSize:13}}>複製文字</button>
          </div>
        </div>
      </div>}

      {/* 私房景點 Modal */}
      {secret&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:99,padding:20}}>
        <div style={{background:"#fff",borderRadius:16,padding:20,width:"100%",maxWidth:340,maxHeight:"90vh",overflowY:"auto"}}>
          {sSent?<div style={{textAlign:"center",padding:"24px 0"}}>
            <div style={{fontSize:48}}>🎉</div>
            <div style={{fontWeight:700,fontSize:17,marginTop:8}}>感謝你的推薦！</div>
            <div style={{fontSize:13,color:"#666",marginTop:8,lineHeight:1.7}}>審核通過後我們會透過官方信箱聯絡你！</div>
            <div style={{marginTop:12,background:"#fef5e7",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#e67e22"}}>⏱ 審核時間約 2–4 週</div>
            <button onClick={()=>{setSecret(false);setSSent(false);setSf({name:"",area:"",desc:"",email:""});}} style={{marginTop:16,background:"#c0392b",color:"#fff",border:"none",borderRadius:20,padding:"10px 28px",cursor:"pointer",fontWeight:700}}>關閉</button>
          </div>:<>
            <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>💡 推薦私房景點</div>
            <div style={{fontSize:12,color:"#888",marginBottom:12,lineHeight:1.6}}>推薦通過審核上架後，我們會寄送通知！</div>
            <label style={{fontSize:12,color:"#555"}}>景點名稱 *</label>
            <input value={sf.name} onChange={e=>setSf(f=>({...f,name:e.target.value}))} placeholder="景點名稱" style={S}/>
            <label style={{fontSize:12,color:"#555",marginTop:10,display:"block"}}>所在區域 *</label>
            <input value={sf.area} onChange={e=>setSf(f=>({...f,area:e.target.value}))} placeholder="例：台東區" style={S}/>
            <label style={{fontSize:12,color:"#555",marginTop:10,display:"block"}}>景點描述 *</label>
            <textarea value={sf.desc} onChange={e=>setSf(f=>({...f,desc:e.target.value}))} placeholder="為什麼推薦？" style={{...S,height:70,resize:"none"}}/>
            <label style={{fontSize:12,color:"#555",marginTop:10,display:"block"}}>Email *</label>
            <input type="email" value={sf.email} onChange={e=>setSf(f=>({...f,email:e.target.value}))} placeholder="your@email.com" style={S}/>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={()=>setSecret(false)} style={{flex:1,background:"#eee",border:"none",borderRadius:20,padding:"10px",cursor:"pointer"}}>取消</button>
              <button onClick={()=>{if(sf.name&&sf.area&&sf.desc&&sf.email)setSSent(true);}}
                style={{flex:2,background:(sf.name&&sf.area&&sf.desc&&sf.email)?"#c0392b":"#ddd",color:(sf.name&&sf.area&&sf.desc&&sf.email)?"#fff":"#aaa",border:"none",borderRadius:20,padding:"10px",cursor:"pointer",fontWeight:700}}>
                送出推薦 ✈️
              </button>
            </div>
          </>}
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/tabinihon/sw.js')
      .then(() => console.log('✅ SW 註冊成功'))
      .catch(e => console.log('SW 註冊失敗', e));
  });
}
</script>
</body>
</html>
