<style>

<body>
<div id="root"></div>

<!-- 除錯視窗 -->
<div id="debug-panel" class="debug-panel">
  <div>🔍 <strong>除錯模式</strong> - 點擊關閉</div>
  <div id="debug-content"></div>
</div>

<script type="text/babel">
// ==========================================
// 🔧 Supabase 設定
// ==========================================
const SUPABASE_URL = "https://vxdpnhjitcdtyshnopus.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4ZHBuaGppdGNkdHlzaG5vcHVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTcwMzEsImV4cCI6MjA5MTEzMzAzMX0.VEFi_QAH4afDCMYPiNVsRPgAIGrTxwjY7ApflwUsANU";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==========================================
// 🐛 除錯工具
// ==========================================
let debugLogs = [];
function debugLog(msg, data = null) {
  const timestamp = new Date().toLocaleTimeString();
  const logEntry = `[${timestamp}] ${msg}`;
  debugLogs.push(logEntry);
  if (data) {
    console.log(msg, data);
    debugLogs.push(JSON.stringify(data, null, 2));
  } else {
    console.log(msg);
  }
  updateDebugPanel();
}

function updateDebugPanel() {
  const panel = document.getElementById('debug-content');
  if (panel) {
    panel.innerHTML = debugLogs.slice(-20).map(log => `<div>${log}</div>`).join('');
  }
}

// 點擊除錯面板關閉
document.addEventListener('DOMContentLoaded', () => {
  const panel = document.getElementById('debug-panel');
  if (panel) {
    panel.addEventListener('click', () => {
      panel.classList.toggle('hidden');
    });
  }
});

// ==========================================
// 📡 從 Supabase 載入景點資料
// ==========================================
async function fetchSpots() {
  debugLog("🚀 開始載入景點資料...");
  
  try {
    debugLog("📞 呼叫 Supabase API...");
    const { data, error } = await supabase
      .from('spots')
      .select('*')
      .eq('status', '已上架')
      .order('sort_order', { ascending: true });

    if (error) {
      debugLog("❌ Supabase 錯誤:", error);
      throw error;
    }
    
    debugLog(`✅ 成功取得 ${data?.length || 0} 筆資料`);
    
    if (!data || data.length === 0) {
      debugLog("⚠️ 警告：沒有找到任何 status='已上架' 的景點");
      
      // 嘗試查詢所有景點看看有哪些 status
      const { data: allData } = await supabase
        .from('spots')
        .select('name, status')
        .limit(10);
      
      debugLog("📋 前 10 筆景點狀態:", allData);
    }
    
    const processed = (data || []).map((row, i) => {
      debugLog(`處理景點 ${i + 1}: ${row.name} (status: ${row.status})`);
      
      const parseJSON = (field, fieldName) => {
        if (!field) return [];
        if (typeof field === 'string') {
          try { 
            const parsed = JSON.parse(field);
            debugLog(`  ✓ ${fieldName} 解析成功`);
            return parsed;
          }
          catch (e) { 
            debugLog(`  ⚠️ ${fieldName} 解析失敗: ${field.substring(0, 50)}...`);
            return [];
          }
        }
        return Array.isArray(field) ? field : [];
      };

      const parseArray = (field, fieldName) => {
        if (!field) return [];
        if (Array.isArray(field)) return field;
        if (typeof field === 'string') {
          if (field.startsWith('{') && field.endsWith('}')) {
            return field.slice(1, -1).split(',').map(s => s.trim()).filter(Boolean);
          }
          return field.split('｜').map(s => s.trim()).filter(Boolean);
        }
        return [];
      };

      const metroLines = parseJSON(row.metro_lines, 'metro_lines');
      const metroInfo = metroLines.map(m => m.info || '').join('｜');

      const photos = parseJSON(row.photos, 'photos');
      if (row.cover_photo && !photos.includes(row.cover_photo)) {
        photos.unshift(row.cover_photo);
      }

      const subFacilities = row.sub_facilities ? row.sub_facilities.split('•').map(item => {
        const parts = item.split(',').map(x => x.trim());
        return {
          name: parts[0] || '',
          price: parts[1] || '',
          url: parts[2] || '',
          note: parts.slice(3).join(',')
        };
      }).filter(x => x.name) : [];

      return {
        id: row.id || ("r" + i),
        name: row.name || '',
        jaName: row.name_ja || '',
        area: row.area || '',
        type: row.spot_type || '',
        axis: row.axis || '',
        tag: row.positioning || '',
        season: row.season_highlights ? row.season_highlights.split('｜').filter(Boolean) : [],
        metro: metroInfo,
        walkMin: row.walk_minutes || 0,
        ticket: row.ticket_price || '',
        ticketMethod: row.ticket_method || '',
        ticketUrl: row.ticket_url_official || '',
        partnerUrl: row.ticket_url_partner || '',
        ticketNote: row.ticket_note || '',
        ticketAlert: row.ticket_alerts ? (typeof row.ticket_alerts === 'string' ? row.ticket_alerts.split('｜').map(s => s.trim()).filter(Boolean) : parseArray(row.ticket_alerts, 'ticket_alerts')) : [],
        subTickets: subFacilities,
        openTime: row.opening_hours || '',
        holiday: row.closed_days || '',
        stayTime: row.suggested_duration || '',
        editorial: row.editorial || '',
        suitable: row.suitable_for || '',
        bestTime: row.best_visit_time || '',
        arrivalNote: row.arrival_note || '',
        tripType: row.trip_type || '',
        fromCity: row.from_city || '',
        transit: row.transit_method || '',
        tripTip: row.trip_tips || '',
        nearby: parseArray(row.nearby_spots, 'nearby_spots'),
        food: parseArray(row.food_recommendations, 'food_recommendations'),
        stay: parseArray(row.accommodation_recommendations, 'accommodation_recommendations'),
        shops: parseArray(row.shop_recommendations, 'shop_recommendations'),
        walking: [
          ...parseArray(row.food_recommendations, 'food_recommendations'),
          ...parseArray(row.accommodation_recommendations, 'accommodation_recommendations')
        ],
        mapsUrl: row.google_maps_url || '',
        officialUrl: row.ticket_url_official || '',
        sortOrder: row.sort_order || 999,
        banner: row.banner || '',
        photos: photos.length ? photos : ["📸"]
      };
    });
    
    debugLog(`✅ 景點資料處理完成，共 ${processed.length} 筆`);
    return processed;
  } catch (error) {
    debugLog('❌ Supabase 載入失敗:', error);
    return [];
  }
}

// ==========================================
// 軸線顏色定義
// ==========================================
const AXES = {
  "傳統文化軸": { icon: "⛩️", bg: "#9b59b6", color: "#9b59b6" },
  "流行潮流軸": { icon: "🏙️", bg: "#3498db", color: "#3498db" },
  "美食職人軸": { icon: "🍱", bg: "#e74c3c", color: "#e74c3c" },
  "職人選物軸": { icon: "🛍️", bg: "#27ae60", color: "#27ae60" },
  "近郊小旅行": { icon: "🚃", bg: "#34495e", color: "#34495e" }
};
const DEF = { icon: "📍", bg: "#95a5a6", color: "#95a5a6" };
const getAx = ax => AXES[ax] || DEF;

// ==========================================
// React Components
// ==========================================
const { useState, useEffect } = React;

function SpotCard({ s, isFav, isSel, onFav, onToggle, onClick }) {
  const sa = getAx(s.axis);
  const hasCover = s.photos && s.photos[0] && s.photos[0].startsWith("http");
  return (
    <div onClick={onClick} style={{ minWidth: 140, maxWidth: 140, background: "#fff", borderRadius: 12, overflow: "hidden", cursor: "pointer", boxShadow: "0 2px 8px rgba(0,0,0,0.08)", position: "relative" }}>
      <div style={{ height: 100, background: hasCover ? "#111" : sa.bg, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
        {hasCover
          ? <img src={s.photos[0]} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt="" />
          : <div style={{ fontSize: 36 }}>{sa.icon}</div>}
      </div>
      <div style={{ padding: "8px 10px" }}>
        <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{s.name}</div>
        <div style={{ fontSize: 10, color: "#999", marginBottom: 6 }}>{s.area}</div>
        {s.tag && <div style={{ display: "inline-block", fontSize: 9, background: sa.bg, color: "#fff", borderRadius: 8, padding: "1px 6px", marginBottom: 4 }}>{s.tag}</div>}
      </div>
      <button
        onClick={e => { e.stopPropagation(); onFav(); }}
        style={{ position: "absolute", top: 8, left: 8, width: 26, height: 26, background: "rgba(255,255,255,0.9)", border: "none", borderRadius: "50%", cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 1px 4px rgba(0,0,0,0.15)" }}>
        {isFav ? "❤️" : "🤍"}
      </button>
      <button
        onClick={e => { e.stopPropagation(); onToggle(); }}
        style={{ position: "absolute", top: 8, right: 8, width: 28, height: 28, background: isSel ? sa.color : "rgba(255,255,255,0.9)", border: "none", borderRadius: "50%", cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", color: isSel ? "#fff" : "#555", boxShadow: "0 1px 4px rgba(0,0,0,0.15)" }}>
        {isSel ? "✓" : "＋"}
      </button>
    </div>
  );
}

function App() {
  const [spots, setSpots] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [sel, setSel] = useState([]);
  const [favs, setFavs] = useState([]);
  const [page, setPage] = useState("main");

  useEffect(() => {
    debugLog("🎬 APP 開始載入");
    fetchSpots().then(data => {
      debugLog(`📊 載入結果: ${data.length} 個景點`);
      if (data.length === 0) {
        setError("找不到任何景點資料，請檢查：\n1. Supabase 資料表是否有資料\n2. status 欄位是否為「已上架」");
      }
      setSpots(data);
      setLoading(false);
    }).catch(err => {
      debugLog('💥 載入錯誤:', err);
      setError(err.message);
      setSpots([]);
      setLoading(false);
    });
  }, []);

  const toggleSel = id => setSel(s => s.includes(id) ? s.filter(x => x !== id) : s.length < 4 ? [...s, id] : s);
  const toggleFav = id => {
    setFavs(prev => {
      const next = prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
      try { localStorage.setItem("tabinihon_favs", JSON.stringify({ ids: next, ts: Date.now() })); } catch (e) { }
      return next;
    });
  };

  if (loading) return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", gap: 12 }}>
      <div style={{ fontSize: 48 }}>🗾</div>
      <div style={{ fontSize: 15, color: "#c0392b", fontWeight: 700 }}>旅日嚮導 - 測試版</div>
      <div style={{ fontSize: 12, color: "#aaa" }}>載入景點資料中…</div>
      <div style={{ fontSize: 10, color: "#999", marginTop: 20 }}>（開啟瀏覽器開發者工具查看除錯訊息）</div>
    </div>
  );

  if (error) return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", gap: 12, padding: 20 }}>
      <div style={{ fontSize: 48 }}>⚠️</div>
      <div style={{ fontSize: 15, color: "#c0392b", fontWeight: 700 }}>載入失敗</div>
      <div style={{ fontSize: 12, color: "#666", whiteSpace: "pre-line", textAlign: "center" }}>{error}</div>
      <button onClick={() => window.location.reload()} style={{ marginTop: 20, padding: "10px 20px", background: "#c0392b", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer" }}>
        重新載入
      </button>
    </div>
  );

  // 按軸線分組
  const grouped = {};
  spots.forEach(s => {
    const ax = s.axis || "其他";
    if (!grouped[ax]) grouped[ax] = [];
    grouped[ax].push(s);
  });

  return (
    <div style={{ maxWidth: 420, margin: "0 auto", background: "#f8f8f8", minHeight: "100vh", paddingBottom: 80 }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg,#c0392b,#e74c3c)", color: "#fff", padding: "20px 16px 16px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: 24, fontWeight: 700 }}>旅日嚮導</div>
            <div style={{ fontSize: 11, opacity: .85 }}>真實・客觀・嚴選</div>
          </div>
          <div style={{ fontSize: 10, background: "rgba(255,255,255,0.2)", padding: "4px 8px", borderRadius: 4 }}>
            測試版 v1.0
          </div>
        </div>
      </div>

      {/* 資料統計 */}
      <div style={{ background: "#fff", margin: "12px 16px", padding: "12px", borderRadius: 8, boxShadow: "0 1px 4px rgba(0,0,0,0.08)" }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>📊 資料統計</div>
        <div style={{ fontSize: 12, color: "#666" }}>
          總景點數：{spots.length} 個<br />
          已選擇：{sel.length} 個<br />
          已收藏：{favs.length} 個
        </div>
      </div>

      {/* 景點列表 */}
      {Object.keys(grouped).map(axName => {
        const items = grouped[axName];
        const ax = getAx(axName);
        return (
          <div key={axName} style={{ marginBottom: 20 }}>
            <div style={{ padding: "0 16px 8px", display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ fontSize: 18 }}>{ax.icon}</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: ax.color }}>{axName}</div>
              <div style={{ fontSize: 11, color: "#999" }}>（{items.length}）</div>
            </div>
            <div className="hscroll">
              {items.map(s => (
                <SpotCard
                  key={s.id}
                  s={s}
                  isFav={favs.includes(s.id)}
                  isSel={sel.includes(s.id)}
                  onFav={() => toggleFav(s.id)}
                  onToggle={() => toggleSel(s.id)}
                  onClick={() => alert(`景點：${s.name}\n區域：${s.area}\n類型：${s.type}`)}
                />
              ))}
            </div>
          </div>
        );
      })}

      {spots.length === 0 && (
        <div style={{ textAlign: "center", padding: 40, color: "#999" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🔍</div>
          <div>沒有找到景點資料</div>
          <div style={{ fontSize: 12, marginTop: 8 }}>請檢查 Supabase 設定</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
